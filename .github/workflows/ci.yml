name: TrustOS CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build Kernel
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust Nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, llvm-tools-preview
          targets: x86_64-unknown-none

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Show toolchain
        run: |
          rustup show
          rustc --version
          cargo --version

      - name: Build (release)
        run: cargo build --release -p trustos_kernel --verbose 2>&1 | tee build.log

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      - name: Upload kernel binary
        uses: actions/upload-artifact@v4
        with:
          name: trustos-kernel
          path: target/x86_64-unknown-none/release/trustos_kernel
          retention-days: 7

  lint:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust Nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy, rust-src, llvm-tools-preview
          targets: x86_64-unknown-none

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-lint-${{ hashFiles('**/Cargo.lock') }}

      - name: Clippy
        run: cargo clippy --release -p trustos_kernel -- -A clippy::all

  iso-smoke:
    name: ISO Build Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust Nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, llvm-tools-preview
          targets: x86_64-unknown-none

      - name: Install ISO tooling
        run: sudo apt-get update && sudo apt-get install -y xorriso mtools

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build ISO
        run: make iso

      - name: Verify ISO exists and is bootable
        run: |
          test -f trustos.iso
          ls -lh trustos.iso
          # Sanity: ISO should be at least 1 MB (kernel + limine)
          size=$(stat -c%s trustos.iso)
          if [ "$size" -lt 1048576 ]; then
            echo "ISO suspiciously small: $size bytes"
            exit 1
          fi

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: trustos-iso
          path: trustos.iso
          retention-days: 7
